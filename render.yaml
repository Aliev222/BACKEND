services:
  - type: web
    name: ryoho-clicker-api
    runtime: python
    plan: free
    autoDeploy: true

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT

    healthCheckPath: /docs

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: BOT_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false